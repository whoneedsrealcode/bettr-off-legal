<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <title>{{ page.title }} · {{ site.title }}</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      color: #1a1a1a;
      background: #ffffff;
      margin: 0;
      padding: 3rem 1.25rem 5rem;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-size: 1.9rem; line-height: 1.2; margin: 0 0 1.5rem; }
    h2 { font-size: 1.25rem; margin: 2.5rem 0 0.75rem; }
    h3 { font-size: 1.05rem; margin: 1.75rem 0 0.5rem; }
    p, li { font-size: 1rem; }
    a { color: #0a58ca; }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 3rem 0 1.5rem; }
    .meta { color: #666; font-size: 0.9rem; }
    nav.legal { font-size: 0.9rem; }
    nav.legal a { margin-right: 1rem; }
    footer { margin-top: 3rem; color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <main>
    {{ content }}
    <hr>
    <nav class="legal">
      <a href="/terms-conditions">Terms &amp; Conditions</a>
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/imprint">Imprint</a>
    </nav>
    <footer>© {{ site.time | date: '%Y' }} BETTR OFF</footer>
  </main>
</body>
</html>
